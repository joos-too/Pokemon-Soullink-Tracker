name: Build and Deploy to Server

on:
  push:
    branches:
      - master
      - 71-change-backend-to-self-hosted-supabase

jobs:
  build-frontend:
    permissions:
      contents: read
      packages: write
    uses: FreakMediaLP/Workflows/.github/workflows/build-docker.yml@v3
    with:
      version: latest
      cleanup: true
      keep-versions: 3
      build-args: |
        VITE_BACKEND=supabase
        VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}

  deploy:
    needs: build-frontend
    uses: FreakMediaLP/Workflows/.github/workflows/deploy-docker-compose.yml@v3
    with:
      remote-path: ${{ vars.DEPLOY_PATH }}
      compose-file: docker-compose.yml
      cleanup: true
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
