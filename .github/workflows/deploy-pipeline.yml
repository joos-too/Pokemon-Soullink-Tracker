name: Build and Deploy to Server

on:
  push:
    branches:
      - master
      - 71-change-backend-to-self-hosted-supabase

jobs:
  build-frontend:
    permissions:
      contents: read
      packages: write
    uses: FreakMediaLP/Workflows/.github/workflows/build-docker.yml@v2
    with:
      version: latest
      cleanup: true
      keep-versions: 3
      build-args: |
        VITE_BACKEND=supabase
        VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}
    secrets: inherit

  build-supabase:
    permissions:
      contents: read
      packages: write
    uses: FreakMediaLP/Workflows/.github/workflows/build-docker.yml@v2
    with:
      version: latest
      image-name: soullink-tracker-supabase
      dockerfile: docker/supabase/Dockerfile
      cleanup: true
      keep-versions: 3
      build-args: |
        SUPABASE_CLI_VERSION=2.109.1
    secrets: inherit

  deploy:
    needs: [build-frontend, build-supabase]
    uses: FreakMediaLP/Workflows/.github/workflows/deploy-docker-compose.yml@v2
    with:
      remote-path: ${{ vars.DEPLOY_PATH }}
      compose-file: docker-compose.yml
      cleanup: true
    secrets: inherit
